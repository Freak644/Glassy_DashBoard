<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
</head>
<body>
    
    <div class="container">
        <div id="controlPanel" class="blurBg">
            <ul>
                <li><i onclick="handleClick(event,{key:'bm'})" class='bx bxs-bookmark-heart' ></i>BM</li>
                <li><i onclick="handleClick(event,{key:'bg'})" class="bx bx-image"></i>BG</li>
                <li><i onclick="handleClick(event,{key:'clock'})" class="bx bx-time"></i>Clock</li>
                <li><i onclick="handleClick(event,{key:'edit'})" class="bx bx-edit"></i>Edit</li>
                <li><i onclick="handleClick(event,{key:'setting'})" class="bx bxs-cog"></i>sys</li>
                <li><a href="https://github.com/Freak644/Glassy_DashBoard"><i onclick="handleClick(event)" class='bx bxl-github' ></i></a>Repo</li>
            </ul>
        </div>

        <div class="widgets">
            
            <div class="blurBg search">
                <p id="greet">Wellcome! Freak</p>
                <form action="" onsubmit="">
                    <input type="text" name="query" placeholder="Find or Enter URL">
                    <i class="bx bx-search-alt"></i>
                </form>
            </div>

            <div class="blurBg clock">
                <div id="dateCol"></div>
                <div  id="clock-body" class="blurBg" >
                    <span id="thre" class="cont">3</span>
                    <span id="six" class="cont">6</span>
                    <span id="nin" class="cont">9</span>
                    <span id="twe" class="cont">12</span>
                   
                    <div id="midleC"></div>
                    <div id="sec" class="ned"><h3></h3></div>
                    <div id="min" class="ned"><h3></h3></div>
                    <div id="ho" class="ned"> <h3></h3></div>
                </div>
            </div>
            
            <div class="blurBg tasksSduler">

            </div>

            <div class="blurBg weather">

            </div>

            <div class="blurBg fav-siteContainer">
                
            </div>
        </div>
    </div>
    <script type="module" src="./script.js"></script>
</body>
</html>
